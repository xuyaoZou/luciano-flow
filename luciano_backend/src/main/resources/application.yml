server:
  port: ${SERVER_PORT:8090}

spring:
  mvc:
    async:
      request-timeout: 1800000  # 30 分钟，匹配 SseEmitter 超时
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  application:
    name: luciano-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/luciano}
    username: ${SPRING_DATASOURCE_USERNAME:luciano}
    password: ${SPRING_DATASOURCE_PASSWORD:luciano_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

media:
  storage-path: ${MEDIA_STORAGE_PATH:./uploads/media}
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedAt
      logic-delete-value: NOW()
      logic-not-delete-value: "NULL"
  mapper-locations: classpath*:/mapper/**/*.xml

logging:
  config: classpath:logback-spring.xml

luciano:
  jwt:
    secret: ${LUCIANO_JWT_SECRET:luciano-platform-secret-key-must-be-at-least-32-characters-long-for-hmac-sha256}
    access-token-expiration: 86400000   # 24小时（毫秒）
    refresh-token-expiration: 604800000  # 7天（毫秒）